<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WARUNG NUSANTARA — POS System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0b;
    --surface: #1a1714;
    --surface2: #221f1b;
    --surface3: #2d2926;
    --border: #3a3530;
    --accent: #e8a135;
    --accent2: #c97b2a;
    --accent-light: #f5c874;
    --red: #e05252;
    --green: #4caf7d;
    --text: #f0ebe3;
    --text2: #a89f94;
    --text3: #6b625a;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .brand-sub { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .datetime { text-align: right; }
  .time-display { font-family: 'Space Mono', monospace; font-size: 15px; color: var(--accent); }
  .date-display { font-size: 10px; color: var(--text3); }
  .cashier-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text2);
  }
  .cashier-name { font-weight: 600; color: var(--text); font-size: 12px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
  }
  .tab-btn {
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text2); }

  /* ── MAIN CONTENT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── VIEWS ── */
  .view { display: none; width: 100%; }
  .view.active { display: flex; flex: 1; overflow: hidden; }
  #view-report.active, #view-settings.active { display: block; overflow-y: auto; padding: 20px; }

  /* ── MENU PANEL ── */
  .menu-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .menu-search-bar {
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); }

  .cat-scroll {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.2s;
  }
  .cat-pill.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .menu-grid {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    align-content: start;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .menu-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
  .menu-card:active { transform: scale(0.97); }

  .menu-card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    font-size: 0;
  }
  .menu-card-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: var(--surface2);
  }
  .menu-card-body { padding: 8px 10px 10px; }
  .menu-card-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .menu-card-price { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); }
  .menu-card-badge {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .menu-card-out {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: var(--radius-sm);
  }

  /* ── ORDER PANEL ── */
  .order-panel {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .order-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .order-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .order-count {
    background: var(--accent);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .table-selector {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .table-btn {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.2s;
  }
  .table-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  .order-items {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .empty-order {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 8px;
    font-size: 13px;
    text-align: center;
  }
  .empty-icon { font-size: 40px; opacity: 0.4; }

  .order-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px;
    border-radius: 8px;
    background: var(--surface2);
    margin-bottom: 6px;
    border: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  .order-item-emoji { font-size: 22px; flex-shrink: 0; }
  .order-item-info { flex: 1; min-width: 0; }
  .order-item-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-item-price { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); }
  .order-item-note { font-size: 10px; color: var(--text3); font-style: italic; margin-top: 1px; }
  .qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface3);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .qty-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .qty-num { font-family: 'Space Mono', monospace; font-size: 12px; min-width: 18px; text-align: center; }

  .order-summary {
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    flex-shrink: 0;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 5px;
  }
  .summary-row.total {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .summary-row.total .mono { font-family: 'Space Mono', monospace; color: var(--accent); }

  .payment-section { padding: 0 14px 14px; flex-shrink: 0; }
  .payment-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .payment-methods { display: flex; gap: 6px; margin-bottom: 10px; }
  .pay-btn {
    flex: 1;
    padding: 7px 4px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.2s;
    text-align: center;
  }
  .pay-btn.active { background: var(--surface3); border-color: var(--accent); color: var(--accent); }

  .cash-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .cash-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .cash-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .cash-input:focus { border-color: var(--accent); }
  .change-row { font-size: 12px; color: var(--green); font-family: 'Space Mono', monospace; margin-bottom: 8px; }

  .quick-cash { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .quick-cash-btn {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface3);
    color: var(--text2);
    transition: all 0.15s;
    font-family: 'Space Mono', monospace;
  }
  .quick-cash-btn:hover { border-color: var(--accent); color: var(--accent); }

  .checkout-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .checkout-btn:hover { background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,161,53,0.4); }
  .checkout-btn:active { transform: scale(0.98); }
  .checkout-btn:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }

  .clear-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    background: transparent;
    color: var(--red);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--red);
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
    opacity: 0.7;
  }
  .clear-btn:hover { opacity: 1; background: rgba(224,82,82,0.1); }

  /* ── MODAL RECEIPT ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .receipt-modal {
    background: #fff;
    color: #1a1a1a;
    border-radius: 12px;
    width: 100%;
    max-width: 360px;
    max-height: 90vh;
    overflow-y: auto;
    font-family: 'Space Mono', monospace;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .receipt-paper {
    padding: 24px 20px;
  }
  .receipt-header { text-align: center; margin-bottom: 16px; }
  .receipt-logo { font-size: 28px; margin-bottom: 4px; }
  .receipt-resto-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 900; color: #1a1a1a; }
  .receipt-resto-sub { font-family: 'DM Sans', sans-serif; font-size: 10px; color: #666; margin-top: 2px; }
  .receipt-divider { border: none; border-top: 1px dashed #ccc; margin: 12px 0; }
  .receipt-divider-double { border: none; border-top: 2px dashed #1a1a1a; margin: 12px 0; }
  .receipt-meta { font-size: 10px; color: #555; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .receipt-items { margin: 12px 0; }
  .receipt-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
  .receipt-item-left { flex: 1; }
  .receipt-item-name { font-weight: 700; color: #1a1a1a; }
  .receipt-item-detail { color: #666; font-size: 10px; }
  .receipt-item-right { text-align: right; font-weight: 700; }
  .receipt-total-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .receipt-total-row.grand { font-size: 14px; font-weight: 700; border-top: 1px dashed #ccc; padding-top: 8px; margin-top: 8px; }
  .receipt-footer { text-align: center; margin-top: 16px; font-size: 10px; color: #888; line-height: 1.6; font-family: 'DM Sans', sans-serif; }
  .receipt-barcode { font-size: 30px; letter-spacing: -2px; text-align: center; margin: 12px 0; }

  .modal-actions {
    padding: 16px 20px;
    display: flex;
    gap: 8px;
    border-top: 1px solid #eee;
    background: #f9f9f9;
    border-radius: 0 0 12px 12px;
  }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .modal-btn-primary { background: #1a1a1a; color: #fff; }
  .modal-btn-primary:hover { background: #333; }
  .modal-btn-secondary { background: #e8a135; color: #000; }
  .modal-btn-secondary:hover { background: #d4912a; }

  /* ── REPORT VIEW ── */
  .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
  }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--accent); font-weight: 700; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .report-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .report-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .tx-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tx-table th { text-align: left; padding: 8px 10px; color: var(--text3); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .tx-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text2); }
  .tx-table td:last-child { text-align: right; font-family: 'Space Mono', monospace; color: var(--accent); }
  .tx-table tr:hover td { background: var(--surface2); }
  .tx-status { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .tx-status.paid { background: rgba(76,175,125,0.15); color: var(--green); }

  .top-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 24px; }
  .top-item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .top-item-rank { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--accent); font-weight: 700; }
  .top-item-name { font-size: 11px; font-weight: 600; }
  .top-item-qty { font-size: 10px; color: var(--text3); }

  .export-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .export-btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── NOTE MODAL ── */
  .note-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 150;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .note-modal-overlay.open { display: flex; }
  .note-modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 500px;
    border-top: 1px solid var(--border);
  }
  .note-modal h3 { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 12px; }
  .note-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    height: 80px;
    transition: border-color 0.2s;
  }
  .note-textarea:focus { border-color: var(--accent); }
  .note-actions { display: flex; gap: 8px; margin-top: 10px; }
  .note-save-btn {
    flex: 1;
    padding: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .note-cancel-btn {
    padding: 10px 16px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .order-panel { width: 240px; }
    .menu-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  }

  /* ── TOGGLE SWITCH ── */
  .toggle-switch { position: relative; display: inline-block; width: 42px; height: 24px; cursor: pointer; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--surface3);
    border-radius: 12px;
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: var(--text3);
    border-radius: 50%;
    transition: all 0.3s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--green); border-color: var(--green); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }

</style>
</head>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-logo">🍜</div>
      <div>
        <div class="brand-name">WARUNG NUSANTARA</div>
        <div class="brand-sub">POS System v2.0</div>
      </div>
    </div>
    <div class="header-right">
      <div class="datetime">
        <div class="time-display" id="clock">00:00:00</div>
        <div class="date-display" id="dateDisplay">—</div>
      </div>
      <div class="cashier-badge">
        <div class="brand-sub">Kasir</div>
        <div class="cashier-name">Budi Santoso</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pos')">🛒 &nbsp;Kasir / POS</button>
    <button class="tab-btn" onclick="switchTab('report')">📊 &nbsp;Laporan Penjualan</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️ &nbsp;Pengaturan Menu</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- ──────── POS VIEW ──────── -->
    <div class="view active" id="view-pos">
      <!-- MENU PANEL -->
      <div class="menu-panel">
        <!-- Search -->
        <div class="menu-search-bar">
          <input class="search-input" type="text" placeholder="🔍  Cari menu…" id="searchInput" oninput="filterMenu()">
        </div>
        <!-- Category -->
        <div class="cat-scroll" id="catScroll"></div>
        <!-- Grid -->
        <div class="menu-grid" id="menuGrid"></div>
      </div>

      <!-- ORDER PANEL -->
      <div class="order-panel">
        <div class="order-header">
          <div class="order-title">
            Pesanan
            <span class="order-count" id="orderCount">0</span>
          </div>
          <div class="table-selector" id="tableSelector"></div>
        </div>

        <div class="order-items" id="orderItems">
          <div class="empty-order">
            <div class="empty-icon">🛒</div>
            <div>Belum ada pesanan</div>
            <div style="font-size:11px;color:var(--text3)">Pilih menu di sebelah kiri</div>
          </div>
        </div>

        <div class="order-summary">
          <div class="summary-row"><span>Subtotal</span><span id="subtotalDisplay">Rp 0</span></div>
          <div class="summary-row"><span>PPN 11%</span><span id="taxDisplay">Rp 0</span></div>
          <div class="summary-row"><span>Diskon</span><span id="discountDisplay" style="color:var(--green)">- Rp 0</span></div>
          <div class="summary-row total"><span>TOTAL</span><span class="mono" id="totalDisplay">Rp 0</span></div>
        </div>

        <div class="payment-section">
          <div class="payment-label">Metode Pembayaran</div>
          <div class="payment-methods">
            <button class="pay-btn active" id="pay-tunai" onclick="selectPayment('Tunai')">💵 Tunai</button>
            <button class="pay-btn" id="pay-qris" onclick="selectPayment('QRIS')">📱 QRIS</button>
            <button class="pay-btn" id="pay-debit" onclick="selectPayment('Debit')">💳 Debit</button>
          </div>

          <div id="cashSection">
            <div class="quick-cash" id="quickCash"></div>
            <div class="cash-input-row">
              <span class="cash-label">Bayar:</span>
              <input class="cash-input" type="number" id="cashInput" placeholder="0" oninput="calcChange()" />
            </div>
            <div class="change-row" id="changeRow">Kembalian: Rp 0</div>
          </div>

          <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
            🧾 &nbsp;Proses Pembayaran
          </button>
          <button class="clear-btn" onclick="clearOrder()">✕ &nbsp;Batalkan Pesanan</button>
        </div>
      </div>
    </div>

    <!-- ──────── REPORT VIEW ──────── -->
    <div class="view" id="view-report"></div>
    <div class="view" id="view-settings"></div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="note-modal-overlay" id="noteModalOverlay">
  <div class="note-modal">
    <h3>📝 Catatan untuk Item</h3>
    <textarea class="note-textarea" id="noteTextarea" placeholder="Contoh: Pedas ekstra, tidak pakai bawang…"></textarea>
    <div class="note-actions">
      <button class="note-cancel-btn" onclick="closeNoteModal()">Batal</button>
      <button class="note-save-btn" onclick="saveNote()">Simpan Catatan</button>
    </div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="receipt-modal">
    <div class="receipt-paper" id="receiptContent"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-secondary" onclick="printReceipt()">🖨️ &nbsp;Print Struk</button>
      <button class="modal-btn modal-btn-primary" onclick="closeReceipt()">✓ &nbsp;Selesai</button>
    </div>
  </div>
</div>

  { id:25, name:'Es Campur', cat:'Minuman', price:22000, emoji:'🧊', badge:'', available:true },
  // Snack & Gorengan
  { id:26, name:'Pisang Goreng Coklat', cat:'Snack', price:15000, emoji:'🍌', badge:'', available:true },
  { id:27, name:'Tahu Tempe Goreng', cat:'Snack', price:12000, emoji:'🟫', badge:'', available:true },
  { id:28, name:'Kerupuk Udang', cat:'Snack', price:8000, emoji:'🦐', badge:'', available:true },
  { id:29, name:'Martabak Telur', cat:'Snack', price:28000, emoji:'🥚', badge:'', available:true },
  { id:30, name:'Lumpia Goreng', cat:'Snack', price:15000, emoji:'🌯', badge:'', available:true },
];

const CATEGORIES = ['Semua', ...new Set(MENU.map(m => m.cat))];
const TABLES = ['T-01','T-02','T-03','T-04','T-05','T-06','TP-1','TP-2'];

/* =====================================================
   STATE
===================================================== */
let state = {
  activeCategory: 'Semua',
  search: '',
  cart: [],  // { menuId, qty, note }
  selectedTable: 'T-01',
  paymentMethod: 'Tunai',
  transactions: JSON.parse(localStorage.getItem('warung_txs') || '[]'),
  noteTarget: null,  // menuId in cart
};

/* =====================================================
   UTILS
===================================================== */
const fmt = (n) => 'Rp ' + n.toLocaleString('id-ID');
const fmtShort = (n) => {
  if (n >= 1000000) return 'Rp ' + (n/1000000).toFixed(1) + 'jt';
  if (n >= 1000) return 'Rp ' + (n/1000).toFixed(0) + 'rb';
  return 'Rp ' + n;
};

function genTxId() { return 'TRX' + Date.now().toString().slice(-8); }

function showToast(msg, color='var(--green)') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

/* =====================================================
   CLOCK
===================================================== */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID');
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

/* =====================================================
   TABS
===================================================== */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active',
      (i===0 && tab==='pos') ||
      (i===1 && tab==='report') ||
      (i===2 && tab==='settings')
    );
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + tab);
  el.classList.add('active');
  if (tab === 'report') renderReport();
  if (tab === 'settings') renderSettings();
}

/* =====================================================
   INIT UI
===================================================== */
function initCategories() {
  const c = document.getElementById('catScroll');
  c.innerHTML = CATEGORIES.map(cat =>
    `<div class="cat-pill ${cat === state.activeCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</div>`
  ).join('');
}

function initTables() {
  const t = document.getElementById('tableSelector');
  t.innerHTML = TABLES.map(tb =>
    `<div class="table-btn ${tb === state.selectedTable ? 'active' : ''}" onclick="setTable('${tb}')">${tb}</div>`
  ).join('');
}

function setCategory(cat) {
  state.activeCategory = cat;
  initCategories();
  renderMenu();
}

function setTable(tb) {
  state.selectedTable = tb;
  initTables();
}

/* =====================================================
   MENU RENDER
===================================================== */
function filterMenu() {
  state.search = document.getElementById('searchInput').value.toLowerCase();
  renderMenu();
}

function renderMenu() {
  const filtered = MENU.filter(m => {
    const matchCat = state.activeCategory === 'Semua' || m.cat === state.activeCategory;
    const matchSearch = m.name.toLowerCase().includes(state.search);
    return matchCat && matchSearch;
  });
  const g = document.getElementById('menuGrid');
  if (filtered.length === 0) {
    g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);font-size:13px;">🔍 Menu tidak ditemukan</div>`;
    return;
  }
  g.innerHTML = filtered.map(m => `
    <div class="menu-card" onclick="${m.available ? `addToCart(${m.id})` : ''}">
      ${m.img
        ? `<img class="menu-card-img" src="${m.img}" alt="${m.name}" loading="lazy">`
        : `<div class="menu-card-img-placeholder">${m.emoji}</div>`}
      ${m.badge ? `<div class="menu-card-badge">${m.badge}</div>` : ''}
      ${!m.available ? `<div class="menu-card-out">Habis</div>` : ''}
      <div class="menu-card-body">
        <div class="menu-card-name">${m.name}</div>
        <div class="menu-card-price">${fmt(m.price)}</div>
      </div>
    </div>
  `).join('');
}

/* =====================================================
   CART
===================================================== */
function addToCart(menuId) {
  const existing = state.cart.find(c => c.menuId === menuId);
  if (existing) {
    existing.qty++;
    showToast('✓ Jumlah ditambah');
  } else {
    state.cart.push({ menuId, qty: 1, note: '' });
    showToast('✓ Menu ditambahkan!');
  }
  renderCart();
}

function changeQty(menuId, delta) {
  const item = state.cart.find(c => c.menuId === menuId);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) state.cart = state.cart.filter(c => c.menuId !== menuId);
  renderCart();
}

function clearOrder() {
  if (state.cart.length === 0) return;
  if (!confirm('Yakin batalkan semua pesanan?')) return;
  state.cart = [];
  renderCart();
}

function openNoteModal(menuId) {
  state.noteTarget = menuId;
  const item = state.cart.find(c => c.menuId === menuId);
  document.getElementById('noteTextarea').value = item ? item.note : '';
  document.getElementById('noteModalOverlay').classList.add('open');
}

function closeNoteModal() {
  document.getElementById('noteModalOverlay').classList.remove('open');
  state.noteTarget = null;
}

function saveNote() {
  const item = state.cart.find(c => c.menuId === state.noteTarget);
  if (item) item.note = document.getElementById('noteTextarea').value;
  closeNoteModal();
  renderCart();
  showToast('📝 Catatan disimpan');
}

function calcTotals() {
  const subtotal = state.cart.reduce((sum, c) => {
    const m = MENU.find(x => x.id === c.menuId);
    return sum + (m ? m.price * c.qty : 0);
  }, 0);
  const tax = Math.round(subtotal * 0.11);
  const discount = subtotal >= 100000 ? Math.round(subtotal * 0.05) : 0;
  const total = subtotal + tax - discount;
  return { subtotal, tax, discount, total };
}

function renderCart() {
  const { subtotal, tax, discount, total } = calcTotals();
  const count = state.cart.reduce((s, c) => s + c.qty, 0);

  document.getElementById('orderCount').textContent = count;
  document.getElementById('subtotalDisplay').textContent = fmt(subtotal);
  document.getElementById('taxDisplay').textContent = fmt(tax);
  document.getElementById('discountDisplay').textContent = '- ' + fmt(discount);
  document.getElementById('totalDisplay').textContent = fmt(total);

  // checkout btn
  document.getElementById('checkoutBtn').disabled = state.cart.length === 0;

  // quick cash
  if (state.paymentMethod === 'Tunai') {
    const qcAmts = [total, roundUp(total, 10000), roundUp(total, 50000), roundUp(total, 100000)].filter((v,i,a)=>a.indexOf(v)===i);
    document.getElementById('quickCash').innerHTML = qcAmts.map(a =>
      `<button class="quick-cash-btn" onclick="setCash(${a})">${fmtShort(a)}</button>`
    ).join('');
    calcChange();
  }

  const el = document.getElementById('orderItems');
  if (state.cart.length === 0) {
    el.innerHTML = `<div class="empty-order"><div class="empty-icon">🛒</div><div>Belum ada pesanan</div><div style="font-size:11px;color:var(--text3)">Pilih menu di sebelah kiri</div></div>`;
    return;
  }
  el.innerHTML = state.cart.map(item => {
    const m = MENU.find(x => x.id === item.menuId);
    if (!m) return '';
    return `
      <div class="order-item" ondblclick="openNoteModal(${item.menuId})">
        <div class="order-item-emoji">${m.emoji}</div>
        <div class="order-item-info">
          <div class="order-item-name">${m.name}</div>
          <div class="order-item-price">${fmt(m.price * item.qty)}</div>
          ${item.note ? `<div class="order-item-note">📝 ${item.note}</div>` : ''}
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${m.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${m.id},1)">+</button>
        </div>
      </div>
    `;
  }).join('');
}

function roundUp(n, step) { return Math.ceil(n / step) * step; }

/* =====================================================
   PAYMENT
===================================================== */
function selectPayment(method) {
  state.paymentMethod = method;
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pay-' + method.toLowerCase()).classList.add('active');
  const cs = document.getElementById('cashSection');
  cs.style.display = method === 'Tunai' ? 'block' : 'none';
  renderCart();
}

function setCash(amount) {
  document.getElementById('cashInput').value = amount;
  calcChange();
}

function calcChange() {
  const { total } = calcTotals();
  const cash = parseInt(document.getElementById('cashInput').value || '0');
  const change = cash - total;
  const el = document.getElementById('changeRow');
  if (cash === 0) { el.textContent = 'Kembalian: Rp 0'; el.style.color = 'var(--green)'; return; }
  if (change < 0) {
    el.textContent = 'Kurang: ' + fmt(Math.abs(change));
    el.style.color = 'var(--red)';
  } else {
    el.textContent = 'Kembalian: ' + fmt(change);
    el.style.color = 'var(--green)';
  }
}

/* =====================================================
   CHECKOUT
===================================================== */
function checkout() {
  const { subtotal, tax, discount, total } = calcTotals();
  const cash = state.paymentMethod === 'Tunai' ? parseInt(document.getElementById('cashInput').value || '0') : total;
  if (state.paymentMethod === 'Tunai' && cash < total) {
    showToast('⚠️ Uang bayar kurang!', 'var(--red)');
    return;
  }
  const tx = {
    id: genTxId(),
    ts: Date.now(),
    table: state.selectedTable,
    items: JSON.parse(JSON.stringify(state.cart)),
    subtotal, tax, discount, total,
    payment: state.paymentMethod,
    cash,
    change: cash - total,
  };
  state.transactions.unshift(tx);
  localStorage.setItem('warung_txs', JSON.stringify(state.transactions));
  showReceiptModal(tx);
}

/* =====================================================
   REPORT
===================================================== */
function renderReport() {
  const el = document.getElementById('view-report');
  const txs = state.transactions;

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayTxs = txs.filter(t => t.ts >= todayStart.getTime());
  const totalRevToday = todayTxs.reduce((s,t) => s+t.total, 0);
  const totalRev = txs.reduce((s,t) => s+t.total, 0);
  const avgTx = txs.length ? Math.round(totalRev / txs.length) : 0;

  // Top items
  const itemCount = {};
  txs.forEach(tx => tx.items.forEach(item => {
    itemCount[item.menuId] = (itemCount[item.menuId] || 0) + item.qty;
  }));
  const topItems = Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Transactions table
  const txRows = txs.slice(0, 30).map(tx => `
    <tr>
      <td style="color:var(--text3);font-family:'Space Mono',monospace;font-size:10px">${tx.id}</td>
      <td>${tx.table}</td>
      <td style="color:var(--text3);font-size:10px">${formatDate(tx.ts)}</td>
      <td>${tx.payment}</td>
      <td><span class="tx-status paid">Lunas</span></td>
      <td>${fmt(tx.total)}</td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="export-bar">
      <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
      <button class="export-btn" onclick="clearAllData()">🗑️ Reset Data</button>
    </div>

    <div class="report-section-title">Ringkasan Hari Ini</div>
    <div class="report-grid">
      <div class="stat-card">
        <div class="stat-label">Pendapatan Hari Ini</div>
        <div class="stat-value">${fmtShort(totalRevToday)}</div>
        <div class="stat-sub">${todayTxs.length} transaksi</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Semua Waktu</div>
        <div class="stat-value">${fmtShort(totalRev)}</div>
        <div class="stat-sub">${txs.length} transaksi</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rata-rata Transaksi</div>
        <div class="stat-value">${fmtShort(avgTx)}</div>
        <div class="stat-sub">per transaksi</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Item Terjual</div>
        <div class="stat-value">${txs.reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+i.qty,0),0)}</div>
        <div class="stat-sub">dari ${txs.length} transaksi</div>
      </div>
    </div>

    <div class="report-section-title">Menu Terlaris</div>
    ${topItems.length > 0 ? `
    <div class="top-items">
      ${topItems.map(([id, qty], idx) => {
        const m = MENU.find(x => x.id === parseInt(id));
        return m ? `
          <div class="top-item-card">
            <div class="top-item-rank">${idx+1}</div>
            <div>
              <div class="top-item-name">${m.emoji} ${m.name}</div>
              <div class="top-item-qty">${qty}x terjual</div>
            </div>
          </div>` : '';
      }).join('')}
    </div>` : '<div style="color:var(--text3);font-size:13px;margin-bottom:20px">Belum ada data penjualan</div>'}

    <div class="report-section-title">Riwayat Transaksi</div>
    ${txs.length > 0 ? `
    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">
      <table class="tx-table">
        <thead><tr>
          <th>No. Struk</th><th>Meja</th><th>Waktu</th><th>Pembayaran</th><th>Status</th><th>Total</th>
        </tr></thead>
        <tbody>${txRows}</tbody>
      </table>
    </div>` : '<div style="color:var(--text3);font-size:13px">Belum ada transaksi</div>'}
  `;
}

function exportCSV() {
  const headers = ['No. Struk','Meja','Waktu','Item','Subtotal','PPN','Diskon','Total','Pembayaran'];
  const rows = state.transactions.map(tx => [
    tx.id, tx.table, formatDate(tx.ts),
    tx.items.map(i => { const m=MENU.find(x=>x.id===i.menuId); return m?`${m.name}x${i.qty}`:''; }).join(' | '),
    tx.subtotal, tx.tax, tx.discount, tx.total, tx.payment
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `laporan-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('📥 CSV berhasil diunduh!');
}

function clearAllData() {
  if (!confirm('Hapus semua data transaksi? Ini tidak bisa dibatalkan!')) return;
  state.transactions = [];
  localStorage.removeItem('warung_txs');
  renderReport();
  showToast('🗑️ Data dihapus');
}

    </div>

    <div id="settings-menu-list"></div>
  `;
  filterSettings('all');
}

let settingsFilter = 'all';
function filterSettings(f) {
  settingsFilter = f;
  document.querySelectorAll('[id^="filter-"]').forEach(b => {
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--text2)';
  });
  const active = document.getElementById('filter-' + f);
  if (active) { active.style.borderColor = 'var(--accent)'; active.style.color = 'var(--accent)'; }

  const filtered = f === 'available' ? MENU.filter(m=>m.available)
                 : f === 'out' ? MENU.filter(m=>!m.available)
                 : MENU;

  const el = document.getElementById('settings-menu-list');
  if (!el) return;
  el.innerHTML = `
    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">
      <table class="tx-table" style="min-width:600px">
        <thead><tr>
          <th style="width:60px">Foto</th>
          <th>Nama Menu</th>
          <th>Kategori</th>
          <th>Harga</th>
          <th style="text-align:center">Status Stok</th>
          <th style="text-align:center">Badge</th>
          <th style="text-align:center">Aksi</th>
        </tr></thead>
        <tbody>
          ${filtered.map(m => `
            <tr id="menu-row-${m.id}">
              <td>
                <div style="width:48px;height:48px;border-radius:8px;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">
                  ${m.img ? `<img src="${m.img}" style="width:100%;height:100%;object-fit:cover">` : m.emoji}
                </div>
              </td>
              <td>
                <div style="font-weight:600;font-size:13px;color:var(--text)">${m.name}</div>
                <div style="font-size:10px;color:var(--text3)">#${m.id}</div>
              </td>
              <td style="color:var(--text2)">${m.cat}</td>
              <td>
                <input
                  type="number"
                  value="${m.price}"
                  onchange="updatePrice(${m.id}, this.value)"
                  style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--accent);font-family:'Space Mono',monospace;font-size:11px;width:90px;outline:none"
                  onfocus="this.style.borderColor='var(--accent)'"
                  onblur="this.style.borderColor='var(--border)'"
                >
              </td>
              <td style="text-align:center">
                <label class="toggle-switch" title="${m.available ? 'Klik untuk set Habis' : 'Klik untuk set Tersedia'}">
                  <input type="checkbox" ${m.available ? 'checked' : ''} onchange="toggleStock(${m.id}, this.checked)">
                  <span class="toggle-slider"></span>
                </label>
                <div style="font-size:10px;margin-top:4px;color:${m.available ? 'var(--green)' : 'var(--red)'}">
                  ${m.available ? 'Tersedia' : 'Habis'}
                </div>
              </td>
              <td style="text-align:center">
                <select
                  onchange="updateBadge(${m.id}, this.value)"
                  style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text2);font-size:11px;outline:none"
                >
                  <option value="" ${!m.badge ? 'selected' : ''}>— Tidak ada —</option>
                  <option value="Terlaris" ${m.badge==='Terlaris' ? 'selected' : ''}>Terlaris</option>
                  <option value="Baru" ${m.badge==='Baru' ? 'selected' : ''}>Baru</option>
                  <option value="Chef Pick" ${m.badge==='Chef Pick' ? 'selected' : ''}>Chef Pick</option>
                  <option value="Segar" ${m.badge==='Segar' ? 'selected' : ''}>Segar</option>
                  <option value="Promo" ${m.badge==='Promo' ? 'selected' : ''}>Promo</option>
                  <option value="Diskon" ${m.badge==='Diskon' ? 'selected' : ''}>Diskon</option>
                </select>
              </td>
              <td style="text-align:center">
                <button onclick="deleteMenu(${m.id})"
                  style="background:rgba(224,82,82,0.1);border:1px solid var(--red);color:var(--red);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all 0.2s"
                  onmouseover="this.style.background='rgba(224,82,82,0.25)'"
                  onmouseout="this.style.background='rgba(224,82,82,0.1)'"
                >🗑️ Hapus</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div style="margin-top:12px;font-size:11px;color:var(--text3)">
      💡 Tips: Klik harga untuk edit langsung. Toggle untuk ubah status stok. Perubahan langsung diterapkan ke menu kasir.
    </div>
  `;
}

function toggleStock(menuId, isAvailable) {
  const m = MENU.find(x => x.id === menuId);
  if (!m) return;
  m.available = isAvailable;
  renderMenu();
  renderSettings();
  showToast(isAvailable ? '✅ Menu tersedia' : '❌ Menu diset habis', isAvailable ? 'var(--green)' : 'var(--red)');
}

function updatePrice(menuId, newPrice) {
  const m = MENU.find(x => x.id === menuId);
  if (!m) return;
  const p = parseInt(newPrice);
  if (isNaN(p) || p < 0) return;
  m.price = p;
  renderMenu();
  renderCart();
  showToast('💰 Harga diperbarui');
}

function updateBadge(menuId, badge) {
  const m = MENU.find(x => x.id === menuId);
  if (!m) return;
  m.badge = badge;
  renderMenu();
  showToast('🏷️ Badge diperbarui');
}

function deleteMenu(menuId) {
  const m = MENU.find(x => x.id === menuId);
  if (!m) return;
  if (!confirm(`Hapus menu "${m.name}"? Ini tidak bisa dibatalkan.`)) return;
  const idx = MENU.findIndex(x => x.id === menuId);
  MENU.splice(idx, 1);
  state.cart = state.cart.filter(c => c.menuId !== menuId);
  renderMenu();
  renderCart();
  renderSettings();
  showToast('🗑️ Menu dihapus', 'var(--red)');
}

function addNewMenuPrompt() {
  const name = prompt('Nama menu baru:');
  if (!name || !name.trim()) return;
  const cat = prompt('Kategori (Nasi & Lauk / Mie & Bakso / Ayam & Ikan / Sayuran / Minuman / Snack):', 'Nasi & Lauk');
  if (!cat) return;
  const price = parseInt(prompt('Harga (Rp):', '25000'));
  if (isNaN(price) || price < 0) return;
  const emoji = prompt('Emoji menu:', '🍽️') || '🍽️';
  const newId = Math.max(...MENU.map(m=>m.id)) + 1;
  MENU.push({ id: newId, name: name.trim(), cat, price, emoji, badge: 'Baru', available: true });
  // Update categories if new
  if (!CATEGORIES.includes(cat)) CATEGORIES.push(cat);
  initCategories();
  renderMenu();
  renderSettings();
  showToast('✨ Menu baru ditambahkan!');
}

/* =====================================================
   INIT
===================================================== */
initCategories();
initTables();
renderMenu();
renderCart();
selectPayment('Tunai');
</script>
</body>
</html>
